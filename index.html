<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhon · Analista Comercial Frinense</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#CC0000;--red-dark:#A00000;--yellow:#F5C800;--yellow-dim:rgba(245,200,0,.12);
--bg:#0D0808;--surface:#160C0C;--surface2:#1F1010;--surface3:#281515;
--border-r:rgba(204,0,0,.2);--border-y:rgba(245,200,0,.15);--text:#F0E8E8;--muted:#7A6060;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
header{position:relative;z-index:20;background:var(--red);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.5);flex-shrink:0;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--yellow);}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 2px var(--yellow);}
.header-info{flex:1;}
.header-info h1{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#fff;}
.header-info p{font-size:10px;color:rgba(255,255,255,.6);font-weight:300;}
.header-stats{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.stat-pill{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--yellow);letter-spacing:.5px;text-transform:uppercase;}
.stat-dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite;box-shadow:0 0 6px var(--yellow);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stat-sub{font-size:10px;color:rgba(255,255,255,.5);text-align:right;}
.stat-sub span{color:rgba(245,200,0,.85);}
.main-wrap{flex:1;display:flex;overflow:hidden;}
.left-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.dashboard{padding:12px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border-r);flex-shrink:0;}
.dash-row{display:flex;gap:10px;margin-bottom:10px;}
.kpi-card{flex:1;background:var(--surface2);border:1px solid var(--border-r);border-radius:8px;padding:11px 14px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--yellow);}
.kpi-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--yellow);line-height:1;letter-spacing:1px;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.clientes-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.clientes-scroll::-webkit-scrollbar{height:3px;}
.clientes-scroll::-webkit-scrollbar-thumb{background:var(--border-r);border-radius:2px;}
.cliente-card{flex-shrink:0;background:var(--surface2);border:1px solid var(--border-r);border-radius:8px;padding:9px 13px;cursor:pointer;transition:all .2s;min-width:155px;max-width:175px;position:relative;}
.cliente-card:hover{border-color:var(--yellow);background:var(--surface3);transform:translateY(-2px);}
.cliente-rank{position:absolute;top:5px;right:7px;font-family:'Bebas Neue',sans-serif;font-size:17px;color:rgba(245,200,0,.2);line-height:1;}
.cliente-nome{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;padding-right:18px;}
.cliente-kg{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--yellow);font-weight:700;}
.cliente-fat{font-size:10px;color:var(--muted);margin-top:1px;}
#messages{flex:1;overflow-y:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:var(--border-r);border-radius:2px;}
.welcome{margin:auto;text-align:center;max-width:440px;animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.welcome h2{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:#fff;line-height:1;margin-bottom:8px;}
.welcome h2 span{color:var(--yellow);}
.welcome p{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300;margin-bottom:18px;}
.welcome p strong{color:var(--yellow);font-weight:600;}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.suggestion{background:var(--surface2);border:1px solid var(--border-r);border-radius:6px;padding:7px 13px;font-size:11px;cursor:pointer;transition:all .2s;color:var(--text);font-weight:500;}
.suggestion:hover{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-dim);}
.message{display:flex;gap:10px;animation:fadeUp .3s ease;max-width:90%;}
.message.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px;}
.message.assistant .msg-avatar{background:var(--red);color:var(--yellow);border:1.5px solid var(--yellow);}
.message.user .msg-avatar{background:var(--surface2);border:1px solid var(--border-r);color:var(--muted);font-size:13px;}
.bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;}
.message.assistant .bubble{background:var(--surface);border:1px solid var(--border-r);border-radius:3px 10px 10px 10px;}
.message.user .bubble{background:var(--red-dark);border-radius:10px 3px 10px 10px;color:white;}
.bubble h2,.bubble h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--yellow);margin:12px 0 6px;text-transform:uppercase;font-size:13px;border-bottom:1px solid var(--border-y);padding-bottom:3px;}
.bubble h2:first-child,.bubble h3:first-child{margin-top:0;}
.bubble strong{color:var(--yellow);font-weight:600;}
.bubble p{margin-bottom:7px;}.bubble p:last-child{margin-bottom:0;}
.bubble ul{margin:6px 0 6px 16px;}.bubble li{margin-bottom:3px;}
.bubble table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px;}
.bubble th{background:rgba(204,0,0,.2);padding:6px 10px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--yellow);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border-r);}
.bubble td{padding:6px 10px;border-bottom:1px solid rgba(204,0,0,.07);}
.bubble tr:last-child td{border-bottom:none;}
.bubble tr:hover td{background:rgba(204,0,0,.04);}
.typing .bubble{display:flex;gap:5px;align-items:center;padding:12px 16px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);opacity:.7;animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{transform:scale(1);opacity:.7}30%{transform:scale(1.4);opacity:1}}
.init-loader{margin:auto;text-align:center;animation:fadeUp .4s ease;}
.init-loader .spinner{width:30px;height:30px;margin:0 auto 10px;border:2px solid var(--border-r);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.init-loader p{font-size:13px;color:var(--muted);font-weight:300;}
.input-area{padding:12px 16px;background:var(--surface);border-top:2px solid var(--red);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
#userInput{flex:1;background:var(--surface2);border:1px solid var(--border-r);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;resize:none;max-height:100px;min-height:40px;line-height:1.5;transition:border-color .2s,box-shadow .2s;}
#userInput:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px var(--yellow-dim);}
#userInput::placeholder{color:var(--muted);}
#userInput:disabled{opacity:.4;cursor:not-allowed;}
#sendBtn{width:40px;height:40px;flex-shrink:0;background:var(--red);border:1px solid rgba(245,200,0,.3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#sendBtn:hover{background:var(--red-dark);transform:scale(1.05);}
#sendBtn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#sendBtn svg{width:15px;height:15px;fill:var(--yellow);}
.side-panel{width:0;overflow:hidden;background:var(--surface);border-left:1px solid var(--border-r);transition:width .3s ease;display:flex;flex-direction:column;flex-shrink:0;}
.side-panel.open{width:320px;}
.panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border-r);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--yellow);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.panel-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 6px;border-radius:4px;transition:color .2s;flex-shrink:0;}
.panel-close:hover{color:var(--yellow);}
.panel-content{flex:1;overflow-y:auto;padding:12px 16px;}
.panel-content::-webkit-scrollbar{width:3px;}
.panel-content::-webkit-scrollbar-thumb{background:var(--border-r);}
.panel-cliente-nome{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:1px;margin-bottom:4px;}
.panel-totais{display:flex;gap:8px;margin-bottom:14px;}
.panel-kpi{flex:1;background:var(--surface2);border:1px solid var(--border-r);border-radius:6px;padding:7px 9px;}
.panel-kpi-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.panel-kpi-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--yellow);line-height:1.1;}
.prod-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(204,0,0,.08);}
.prod-row:last-child{border-bottom:none;}
.prod-nome{font-size:11px;color:var(--text);flex:1;padding-right:8px;line-height:1.3;}
.prod-vals{text-align:right;flex-shrink:0;}
.prod-kg{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--yellow);font-weight:700;}
.prod-r{font-size:10px;color:var(--muted);}
.panel-loading{text-align:center;padding:24px;color:var(--muted);font-size:12px;}
</style>
</head>

  <div class="header-info">
    <h1>Jhon · Analista Comercial</h1>
    <p>Especialista em Indicadores de Vendas · Frinense Alimentos</p>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><div class="stat-dot"></div><span id="totalReg">—</span></div>
    <div class="stat-sub" id="ultimaNota">Última nota: —</div>
  </div>
</header>

<div class="main-wrap">
  <div class="left-col">
    <div class="dashboard" id="dashboard" style="display:none">
      <div class="dash-row">
        <div class="kpi-card">
          <div class="kpi-label">Faturamento — <span id="diaLabel">—</span></div>
          <div class="kpi-value" id="kpiFat">—</div>
          <div class="kpi-sub">R$</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Volume — <span id="diaLabel2">—</span></div>
          <div class="kpi-value" id="kpiKg">—</div>
          <div class="kpi-sub">kg</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Notas — <span id="diaLabel3">—</span></div>
          <div class="kpi-value" id="kpiNotas">—</div>
          <div class="kpi-sub">transações</div>
        </div>
      </div>
      <div class="section-label">Top 10 Clientes por Volume</div>
      <div class="clientes-scroll" id="clientesScroll"></div>
    </div>

    <div id="messages">
      <div class="init-loader" id="initLoader">
        <div class="spinner"></div>
        <p>Carregando dashboard...</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Pergunte ao Jhon sobre suas vendas..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
      <button id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="panel-header">
      <div class="panel-title" id="panelTitle">Detalhamento</div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="panel-loading">Selecione um cliente</div>
    </div>
  </div>
</div>

<script>
let conversationHistory = [];

function fmtBRL(v){return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtKg(v){return parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' kg';}

function renderMarkdown(text) {
  text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm,(match,header,rows)=>{
    const ths=header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs=rows.trim().split('\n').map(row=>{
      const tds=row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  text=text.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text=text.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  text=text.replace(/\n\n/g,'</p><p>');
  return `<p>${text}</p>`;
}

async function init() {
  try {
    const r = await fetch('/dashboard');
    if (!r.ok) throw new Error('Erro ao carregar dashboard');
    const d = await r.json();

    document.getElementById('totalReg').textContent = d.total_registros.toLocaleString('pt-BR') + ' registros';
    document.getElementById('ultimaNota').innerHTML = `Última nota: <span>${d.ultima_nota}</span>`;
    ['diaLabel','diaLabel2','diaLabel3'].forEach(id => document.getElementById(id).textContent = d.dia_label);
    document.getElementById('kpiFat').textContent   = fmtBRL(d.fat);
    document.getElementById('kpiKg').textContent    = fmtKg(d.kg);
    document.getElementById('kpiNotas').textContent = d.notas.toLocaleString('pt-BR');

    const scroll = document.getElementById('clientesScroll');
    d.top10.forEach((c,i) => {
      const div = document.createElement('div');
      div.className = 'cliente-card';
      div.innerHTML = `<div class="cliente-rank">${i+1}</div>
        <div class="cliente-nome">${c.nome}</div>
        <div class="cliente-kg">${fmtKg(c.kg)}</div>
        <div class="cliente-fat">${fmtBRL(c.fat)}</div>`;
      div.onclick = () => openCliente(c.nome);
      scroll.appendChild(div);
    });

    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('initLoader').remove();
    showWelcome(d.total_registros);
    document.getElementById('userInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
  } catch(err) {
    document.getElementById('initLoader').innerHTML = `<p style="color:var(--yellow)">❌ ${err.message}</p>`;
  }
}

async function openCliente(nome) {
  document.getElementById('sidePanel').classList.add('open');
  document.getElementById('panelTitle').textContent = nome.length > 26 ? nome.substring(0,26)+'…' : nome;
  document.getElementById('panelContent').innerHTML = '<div class="panel-loading">Carregando...</div>';
  try {
    const r = await fetch('/cliente/' + encodeURIComponent(nome));
    const d = await r.json();
    const prodsHTML = d.produtos.map(p=>`
      <div class="prod-row">
        <div class="prod-nome">${p.nome}</div>
        <div class="prod-vals">
          <div class="prod-kg">${fmtKg(p.kg)}</div>
          <div class="prod-r">${fmtBRL(p.fat)}</div>
        </div>
      </div>`).join('');
    document.getElementById('panelContent').innerHTML = `
      <div class="panel-cliente-nome">${d.nome}</div>
      <div class="panel-totais">
        <div class="panel-kpi"><div class="panel-kpi-label">Volume</div><div class="panel-kpi-val">${fmtKg(d.kg_total)}</div></div>
        <div class="panel-kpi"><div class="panel-kpi-label">Faturamento</div><div class="panel-kpi-val">${fmtBRL(d.fat_total)}</div></div>
      </div>
      <div class="section-label">Produtos comprados</div>
      ${prodsHTML||'<p style="color:var(--muted);font-size:12px">Sem produtos</p>'}`;
  } catch(e) {
    document.getElementById('panelContent').innerHTML = `<p style="color:var(--yellow)">Erro: ${e.message}</p>`;
  }
}

function closePanel(){document.getElementById('sidePanel').classList.remove('open');}

function showWelcome(total) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='welcome'; div.id='welcome';
  div.innerHTML=`<h2>Olá,<br>sou o <span>Jhon</span>.</h2>
    <p>Analista Comercial Sênior da Frinense.<br>Base com <strong>${total.toLocaleString('pt-BR')} registros</strong> disponível.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">Vendas de março 2026</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Top 10 produtos por volume</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Comparar filiais em 2026</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Ranking de vendedores</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Clientes com maior volume</div>
      <div class="suggestion" onclick="sendSuggestion(this)">ITAP vs BJESUS este mês</div>
    </div>`;
  el.appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value=''; input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  const w=document.getElementById('welcome'); if(w) w.remove();
  addMessage('user',text);
  const typing=addTyping();
  conversationHistory.push({role:'user',content:text});
  try {
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:conversationHistory})});
    const data=await r.json();
    typing.remove();
    if(!r.ok) throw new Error(data.detail||JSON.stringify(data));
    if(!data.content||!data.content[0]) throw new Error(JSON.stringify(data));
    const reply=data.content[0].text;
    conversationHistory.push({role:'assistant',content:reply});
    addMessage('assistant',reply);
  } catch(err){typing.remove();addMessage('assistant',`❌ ${err.message}`);}
  document.getElementById('sendBtn').disabled=false;
  scrollToBottom();
}

function addMessage(role,content){
  const el=document.getElementById('messages');
  const div=document.createElement('div');
  div.className=`message ${role}`;
  const av=role==='assistant'?'JH':'👤';
  const rendered=role==='assistant'?renderMarkdown(content):content;
  div.innerHTML=`<div class="msg-avatar">${av}</div><div class="bubble">${rendered}</div>`;
  el.appendChild(div); scrollToBottom(); return div;
}
function addTyping(){
  const el=document.getElementById('messages');
  const div=document.createElement('div');
  div.className='message assistant typing';
  div.innerHTML='<div class="msg-avatar">JH</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(div); scrollToBottom(); return div;
}
function sendSuggestion(el){document.getElementById('userInput').value=el.textContent.trim();sendMessage();}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function scrollToBottom(){const el=document.getElementById('messages');el.scrollTop=el.scrollHeight;}
init();
</script>
</body>
