<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhon · Analista Comercial Frinense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red:        #CC0000;
  --red-dark:   #A00000;
  --red-deep:   #7A0000;
  --yellow:     #F5C800;
  --yellow-dim: rgba(245,200,0,.15);
  --white:      #FFFFFF;
  --bg:         #0D0808;
  --surface:    #160C0C;
  --surface2:   #1F1010;
  --border-r:   rgba(204,0,0,.2);
  --border-y:   rgba(245,200,0,.12);
  --text:       #F0E8E8;
  --muted:      #7A6060;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ─── HEADER ─── */
header {
  position: relative; z-index:10;
  background: var(--red);
  padding: 0 24px;
  height: 64px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
header::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background: var(--yellow);
}

.logo-img {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--yellow);
}
.jhon-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--yellow);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; color: var(--red-dark);
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(255,255,255,.3);
}

.header-info { flex:1 }
.header-info h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--white);
}
.header-info p {
  font-size: 11px; color: rgba(255,255,255,.65);
  font-weight: 300; margin-top: 1px;
}

.header-stats { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.stat-pill {
  display:flex; align-items:center; gap:5px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; color: var(--yellow);
  letter-spacing: .5px; text-transform: uppercase;
}
.stat-dot {
  width:6px; height:6px; border-radius:50%;
  background: var(--yellow);
  animation: pulse 2s infinite;
  box-shadow: 0 0 6px var(--yellow);
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stat-sub { font-size:10px; color:rgba(255,255,255,.5); text-align:right; }
.stat-sub span { color: rgba(245,200,0,.8); }

/* ─── MESSAGES ─── */
#messages {
  flex:1; overflow-y:auto;
  padding: 28px 28px 8px;
  display:flex; flex-direction:column; gap:20px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:var(--border-r); border-radius:2px; }

/* ─── WELCOME ─── */
.welcome {
  margin:auto; text-align:center;
  max-width:540px; animation:fadeUp .6s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.welcome-logo {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--red);
  border: 3px solid var(--yellow);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:28px; color:var(--yellow);
  margin: 0 auto 20px;
  box-shadow: 0 0 32px rgba(204,0,0,.4);
}

.welcome h2 {
  font-family:'Bebas Neue',sans-serif;
  font-size:40px; letter-spacing:2px;
  color:var(--white); line-height:1;
  margin-bottom:10px;
}
.welcome h2 span { color:var(--yellow); }
.welcome p {
  font-size:14px; color:var(--muted);
  line-height:1.7; font-weight:300;
  margin-bottom:28px;
}
.welcome p strong { color:var(--yellow); font-weight:600; }

.suggestions { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.suggestion {
  background:var(--surface2);
  border:1px solid var(--border-r);
  border-radius:6px; padding:8px 15px;
  font-size:12px; cursor:pointer;
  transition:all .2s; color:var(--text);
  font-weight:500;
}
.suggestion:hover {
  border-color:var(--yellow);
  color:var(--yellow);
  background:var(--yellow-dim);
  transform:translateY(-1px);
}

/* ─── MESSAGES BUBBLES ─── */
.message {
  display:flex; gap:12px;
  animation:fadeUp .3s ease;
  max-width:88%;
}
.message.user { align-self:flex-end; flex-direction:row-reverse; }

.msg-avatar {
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0; margin-top:2px;
  font-family:'Bebas Neue',sans-serif; letter-spacing:.5px;
}
.message.assistant .msg-avatar {
  background:var(--red);
  color:var(--yellow);
  font-size:13px;
  border: 1.5px solid var(--yellow);
}
.message.user .msg-avatar {
  background:var(--surface2);
  border:1px solid var(--border-r);
  color:var(--muted); font-size:14px;
}

.bubble {
  padding:12px 16px; border-radius:10px;
  font-size:13.5px; line-height:1.65;
}
.message.assistant .bubble {
  background:var(--surface);
  border:1px solid var(--border-r);
  border-radius:3px 10px 10px 10px;
  color:var(--text);
}
.message.user .bubble {
  background:var(--red-dark);
  border-radius:10px 3px 10px 10px;
  color:white; font-weight:400;
}

/* Markdown */
.bubble h1,.bubble h2,.bubble h3 {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700; letter-spacing:.5px;
  color:var(--yellow); margin:14px 0 8px;
  text-transform:uppercase; font-size:13px;
  border-bottom:1px solid var(--border-y);
  padding-bottom:4px;
}
.bubble h1:first-child,.bubble h2:first-child,.bubble h3:first-child{margin-top:0}
.bubble strong{color:var(--yellow);font-weight:600;}
.bubble em{color:rgba(245,200,0,.7);font-style:italic;}
.bubble p{margin-bottom:8px;}
.bubble p:last-child{margin-bottom:0;}
.bubble ul,.bubble ol{margin:8px 0 8px 18px;}
.bubble li{margin-bottom:4px;}

.bubble table {
  width:100%; border-collapse:collapse;
  margin:10px 0; font-size:12.5px;
  border:1px solid var(--border-r);
  border-radius:6px; overflow:hidden;
}
.bubble th {
  background:rgba(204,0,0,.25);
  padding:7px 12px; text-align:left;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700; color:var(--yellow);
  letter-spacing:.5px; font-size:12px;
  text-transform:uppercase;
  border-bottom:1px solid var(--border-r);
}
.bubble td {
  padding:7px 12px;
  border-bottom:1px solid rgba(204,0,0,.08);
  color:var(--text);
}
.bubble tr:last-child td{border-bottom:none;}
.bubble tr:hover td{background:rgba(204,0,0,.05);}

/* Typing */
.typing .bubble{display:flex;gap:5px;align-items:center;padding:14px 18px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--yellow);opacity:.7;animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{transform:scale(1);opacity:.7}30%{transform:scale(1.4);opacity:1}}

/* Loader */
.init-loader{margin:auto;text-align:center;animation:fadeUp .4s ease;}
.init-loader .spinner{width:32px;height:32px;margin:0 auto 12px;border:2px solid var(--border-r);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.init-loader p{font-size:13px;color:var(--muted);font-weight:300;}

/* ─── INPUT ─── */
.input-area {
  padding:14px 24px;
  background:var(--surface);
  border-top:2px solid var(--red);
  display:flex; gap:10px; align-items:flex-end;
}
#userInput {
  flex:1; background:var(--surface2);
  border:1px solid var(--border-r);
  border-radius:8px; padding:11px 16px;
  color:var(--text); font-size:13.5px;
  font-family:'Barlow',sans-serif; font-weight:400;
  resize:none; max-height:110px; min-height:42px;
  line-height:1.5; transition:border-color .2s, box-shadow .2s;
}
#userInput:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px var(--yellow-dim);}
#userInput::placeholder{color:var(--muted);}
#userInput:disabled{opacity:.4;cursor:not-allowed;}

#sendBtn {
  width:42px; height:42px; flex-shrink:0;
  background:var(--red); border:none; border-radius:8px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s;
  border:1px solid rgba(245,200,0,.3);
}
#sendBtn:hover{background:var(--red-dark);transform:scale(1.05);}
#sendBtn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#sendBtn svg{width:16px;height:16px;fill:var(--yellow);}
</style>
</head>
<body>

<header>
  <img src="https://media.licdn.com/dms/image/v2/C4D0BAQGzHMPGqcqkXA/company-logo_200_200/company-logo_200_200/0/1630570367942/frinense_alimentos_logo?e=2147483647&v=beta&t=placeholder" class="jhon-avatar-img" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="Frinense"><div class="jhon-avatar" style="display:none">JH</div>
  <div class="header-info">
    <h1>Jhon · Analista Comercial</h1>
    <p>Especialista em Indicadores de Vendas · Frinense Alimentos</p>
  </div>
  <div class="header-stats">
    <div class="stat-pill">
      <div class="stat-dot"></div>
      <span id="statusText">Conectando...</span>
    </div>
    <div class="stat-sub" id="dataInfo">—</div>
  </div>
</header>

<div id="messages">
  <div class="init-loader" id="initLoader">
    <div class="spinner"></div>
    <p>Carregando base de dados...</p>
  </div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Pergunte ao Jhon sobre suas vendas..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
  <button id="sendBtn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
let conversationHistory = [];

function renderMarkdown(text) {
  // Tabelas
  text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/gm, (match, header, rows) => {
    const ths = header.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  text = text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  text = text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text = text.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  text = text.replace(/(<li>[\s\S]+?<\/li>)(?=\n(?!<li>)|$)/g,'<ul>$1</ul>');
  text = text.replace(/\n\n/g,'</p><p>');
  return `<p>${text}</p>`;
}

async function init() {
  try {
    const r = await fetch('/vendas');
    if (!r.ok) throw new Error('Falha ao conectar');
    const text = await r.text();
    const lines = text.split('\n').filter(l=>l.trim());
    const total = lines.length - 1;
    const headers = lines[0].split(';');
    const dataIdx = headers.findIndex(h=>h.trim().toUpperCase().includes('DATA_MOVTO'));
    let lastDate = '—';
    if (dataIdx >= 0) {
      const dates = lines.slice(1).map(l=>l.split(';')[dataIdx]?.trim()).filter(d=>d&&d.length>=10).map(d=>d.substring(0,10));
      if (dates.length) {
        const [y,m,d] = dates.sort().pop().split('-');
        lastDate = `${d}/${m}/${y}`;
      }
    }
    document.getElementById('statusText').textContent = `${total.toLocaleString('pt-BR')} registros`;
    document.getElementById('dataInfo').innerHTML = `Atualizado: <span>${new Date().toLocaleDateString('pt-BR')}</span> · Último: <span>${lastDate}</span>`;
    document.getElementById('initLoader').remove();
    showWelcome(total);
    document.getElementById('userInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
  } catch(err) {
    document.getElementById('initLoader').innerHTML = `<p style="color:var(--yellow)">❌ Erro ao conectar. Verifique o servidor.</p>`;
  }
}

function showWelcome(total) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'welcome'; div.id = 'welcome';
  div.innerHTML = `
    <div class="welcome-logo">JH</div>
    <h2>Olá,<br>sou o <span>Jhon</span>.</h2>
    <p>Analista Comercial Sênior da Frinense.<br>
    Base com <strong>${total.toLocaleString('pt-BR')} registros</strong> disponível.<br>
    Pergunte sobre faturamento, volume, clientes, produtos ou qualquer indicador comercial.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">Vendas de março 2026</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Top 10 produtos por volume</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Comparar filiais em 2026</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Ranking de vendedores</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Clientes com maior volume</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Desempenho ITAP vs BJESUS</div>
    </div>`;
  el.appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  const w = document.getElementById('welcome'); if(w) w.remove();
  addMessage('user', text);
  const typing = addTyping();
  conversationHistory.push({role:'user', content:text});

  try {
    const r = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:conversationHistory})
    });
    const data = await r.json();
    typing.remove();
    if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
    if (!data.content || !data.content[0]) throw new Error(JSON.stringify(data));
    const reply = data.content[0].text;
    conversationHistory.push({role:'assistant', content:reply});
    addMessage('assistant', reply);
  } catch(err) {
    typing.remove();
    addMessage('assistant', `❌ ${err.message}`);
  }
  document.getElementById('sendBtn').disabled = false;
  scrollToBottom();
}

function addMessage(role, content) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarLabel = role==='assistant' ? 'JH' : '👤';
  const rendered = role==='assistant' ? renderMarkdown(content) : content;
  div.innerHTML = `<div class="msg-avatar">${avatarLabel}</div><div class="bubble">${rendered}</div>`;
  el.appendChild(div); scrollToBottom(); return div;
}

function addTyping() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant typing';
  div.innerHTML = '<div class="msg-avatar">JH</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(div); scrollToBottom(); return div;
}

function sendSuggestion(el) {
  document.getElementById('userInput').value = el.textContent.trim();
  sendMessage();
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function scrollToBottom(){const el=document.getElementById('messages');el.scrollTop=el.scrollHeight;}

init();
</script>
</body>
</html>
