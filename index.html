<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analista de Vendas IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--accent:#00d4aa;--accent2:#0066ff;--text:#e8edf5;--text-muted:#6b7a99;--border:rgba(255,255,255,0.07);--user-bubble:#0066ff;--bot-bubble:#1a2235}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0}
  .logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .header-text h1{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
  .header-text p{font-size:12px;color:var(--text-muted);margin-top:1px}
  .header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent)}
  .status-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .data-info{font-size:11px;color:var(--text-muted);text-align:right}
  .data-info span{color:var(--accent)}
  #messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  #messages::-webkit-scrollbar{width:4px}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .message{display:flex;gap:12px;animation:fadeUp .3s ease;max-width:85%}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse}
  .avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .message.assistant .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .message.user .avatar{background:var(--user-bubble)}
  .bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:100%}
  .message.assistant .bubble{background:var(--bot-bubble);border:1px solid var(--border);border-radius:4px 12px 12px 12px;color:var(--text)}
  .message.user .bubble{background:var(--user-bubble);border-radius:12px 4px 12px 12px;color:white}
  .bubble strong{color:var(--accent)}
  .bubble table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
  .bubble th{background:rgba(0,212,170,.1);padding:6px 10px;text-align:left;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border)}
  .bubble td{padding:6px 10px;border-bottom:1px solid var(--border)}
  .bubble tr:last-child td{border-bottom:none}
  .welcome{text-align:center;padding:40px 20px;animation:fadeUp .5s ease}
  .welcome h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .welcome p{color:var(--text-muted);font-size:14px;margin-bottom:24px}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .suggestion{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;transition:all .2s;color:var(--text)}
  .suggestion:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,.05)}
  .loading-overlay{text-align:center;padding:40px;animation:fadeUp .3s ease}
  .loading-overlay p{color:var(--text-muted);font-size:14px;margin-top:12px}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .typing .bubble{display:flex;gap:4px;align-items:center;padding:14px 16px}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .input-area{padding:16px 24px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end;flex-shrink:0}
  #userInput{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;max-height:120px;min-height:44px;line-height:1.5;transition:border-color .2s}
  #userInput:focus{outline:none;border-color:var(--accent)}
  #userInput::placeholder{color:var(--text-muted)}
  #sendBtn{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s;flex-shrink:0}
  #sendBtn:hover{opacity:.85;transform:scale(1.05)}
  #sendBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  #sendBtn svg{width:18px;height:18px;fill:white}
</style>
</head>
<body>
<header>
  <div class="logo">📊</div>
  <div class="header-text">
    <h1>Analista de Vendas IA</h1>
    <p>Powered by Claude · Dados atualizados diariamente</p>
  </div>
  <div class="header-right">
    <div class="status">
      <div class="status-dot"></div>
      <span id="statusText">Online</span>
    </div>
    <div class="data-info" id="dataInfo">
      Base: <span id="totalRegistros">-</span> registros · Último: <span id="lastRecord">-</span>
    </div>
  </div>
</header>

<div id="messages">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Conectando ao servidor...</p>
  </div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="Faça uma pergunta sobre suas vendas..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
  <button id="sendBtn" onclick="sendMessage()" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>

<script>
  let conversationHistory = [];

  async function init() {
    try {
      // Verifica saúde do servidor e carrega info do CSV
      const r = await fetch('/vendas');
      if (!r.ok) throw new Error('Erro ao conectar');
      const text = await r.text();
      const lines = text.split('\n').filter(l => l.trim());
      const total = lines.length - 1;
      const header = lines[0];
      const dataLines = lines.slice(1);

      document.getElementById('totalRegistros').textContent = total.toLocaleString('pt-BR');

      // Último registro
      const headers = header.split(';');
      const dataIdx = headers.findIndex(h => h.trim().toUpperCase().includes('DATA_MOVTO'));
      if (dataIdx >= 0) {
        const dates = dataLines.map(l => l.split(';')[dataIdx]?.trim()).filter(d => d && d.length >= 10).map(d => d.substring(0,10));
        if (dates.length > 0) {
          const [y,m,d] = dates.sort().pop().split('-');
          document.getElementById('lastRecord').textContent = `${d}/${m}/${y}`;
        }
      }

      document.getElementById('statusText').textContent = 'Online';
      document.getElementById('loadingOverlay').remove();
      showWelcome(total);
      document.getElementById('userInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;

    } catch(err) {
      document.getElementById('loadingOverlay').innerHTML =
        `<p style="color:#ff5050">❌ Erro ao conectar ao servidor.<br><small>${err.message}</small></p>`;
    }
  }

  function showWelcome(total) {
    const el = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'welcome'; div.id = 'welcome';
    div.innerHTML = `
      <h2>Olá! Sou seu Analista de Vendas 👋</h2>
      <p>Base com <strong style="color:var(--accent)">${total.toLocaleString('pt-BR')} registros</strong> disponível. O que você quer saber hoje?</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">📈 Como foram as vendas ontem?</div>
        <div class="suggestion" onclick="sendSuggestion(this)">🏆 Top 5 produtos mais vendidos em março</div>
        <div class="suggestion" onclick="sendSuggestion(this)">🏢 Comparar filiais este mês</div>
        <div class="suggestion" onclick="sendSuggestion(this)">👤 Ranking de vendedores</div>
        <div class="suggestion" onclick="sendSuggestion(this)">📦 Vendas por categoria em 2025</div>
        <div class="suggestion" onclick="sendSuggestion(this)">📅 Resumo do mês atual</div>
      </div>`;
    el.appendChild(div);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    const w = document.getElementById('welcome'); if(w) w.style.display='none';
    addMessage('user', text);
    const typing = addTyping();
    conversationHistory.push({role:'user', content:text});

    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: conversationHistory})
      });
      const data = await r.json();
      typing.remove();
      if (!data.content || !data.content[0]) throw new Error(JSON.stringify(data));
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const reply = data.content[0].text;
      conversationHistory.push({role:'assistant', content:reply});
      addMessage('assistant', reply);
    } catch(err) {
      typing.remove();
      addMessage('assistant', `❌ Erro: ${err.message}`);
    }

    document.getElementById('sendBtn').disabled = false;
    scrollToBottom();
  }

  function addMessage(role, content) {
    const el = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="avatar">${role==='user'?'👤':'🤖'}</div><div class="bubble">${content}</div>`;
    el.appendChild(div); scrollToBottom(); return div;
  }

  function addTyping() {
    const el = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant typing';
    div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    el.appendChild(div); scrollToBottom(); return div;
  }

  function sendSuggestion(el) { document.getElementById('userInput').value = el.textContent.replace(/^[^\w]+/,'').trim(); sendMessage(); }
  function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
  function scrollToBottom() { const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }

  init();
</script>
</body>
</html>
